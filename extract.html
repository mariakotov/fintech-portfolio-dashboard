                        <svg class="w-5 h-5 text-neon-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>

                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzw5AJcWno-v1PN8oM2dsw2U8iAoEF9wUIwFzekIe4VT1-tsyrkB-_W4BprbN9-1vaE/exec"; 
        let globalCsvData = "";
        const elTickers = document.getElementById('tickers'); const elStartDate = document.getElementById('startDate'); const elEndDate = document.getElementById('endDate'); const elFrequency = document.getElementById('frequency'); const loadBtn = document.getElementById('loadBtn'); const alertContainer = document.getElementById('alertContainer'); const alertText = document.getElementById('alertText'); const loaderContainer = document.getElementById('loaderContainer'); const loaderText = document.getElementById('loaderText'); const previewContainer = document.getElementById('previewContainer'); const dataTable = document.getElementById('dataTable'); const exportContainer = document.getElementById('exportContainer'); const btnCsv = document.getElementById('btnCsv'); const btnSheet = document.getElementById('btnSheet');

        const showAlert = (msg) => { alertText.innerHTML = msg; alertContainer.classList.remove('hidden'); };
        const hideAlert = () => alertContainer.classList.add('hidden');
        const setUIState = (state) => { if (state === 'loading') { hideAlert(); previewContainer.classList.add('hidden'); exportContainer.classList.add('hidden'); loaderContainer.classList.remove('hidden'); loaderContainer.classList.add('flex'); loadBtn.disabled = true; } else { loaderContainer.classList.add('hidden'); loaderContainer.classList.remove('flex'); loadBtn.disabled = false; } };
        const validateInputs = () => { const tickers = elTickers.value.trim(); const start = elStartDate.value; const end = elEndDate.value; if (!tickers) return "נא להזין לפחות סימול מניה אחד."; if (!start || !end) return "יש לבחור תאריכי התחלה וסיום."; if (new Date(start) > new Date(end)) return "אופס! נראה שתאריך ההתחלה מאוחר מתאריך הסיום..."; return null; };

        const renderTable = (csvStr) => { 
            const lines = csvStr.trim().split('\n'); 
            const rowCount = Math.min(7, lines.length); 
            let html = ''; 
            for (let i = 0; i < rowCount; i++) { 
                if (!lines[i]) continue; 
                let rowData = lines[i].split(',').map(cell => cell.replace(/^"|"$/g, '')); 
                if (i === 0) { 
                    html += `<thead class="bg-navy-800 text-slate-300 uppercase text-xs tracking-wider border-b border-white/10"><tr>`; 
                    rowData.forEach(cell => html += `<th class="px-4 py-3 font-bold">${cell}</th>`); 
                    html += `</tr></thead><tbody class="divide-y divide-white/5">`; 
                } else { 
                    html += `<tr class="hover:bg-white/5 transition-colors">`; 
                    rowData.forEach((cell, idx) => { 
                        const isNumber = !isNaN(cell) && cell !== ""; 
                        const colorClass = isNumber ? "text-neon-blue font-mono" : "text-slate-300 font-mono"; 
                        html += `<td class="px-4 py-3 whitespace-nowrap text-xs ${colorClass}">${cell || '-'}</td>`; 
                    }); 
                    html += `</tr>`; 
                } 
            } 
            html += `</tbody>`; 
            dataTable.innerHTML = html; 
        };

        loadBtn.addEventListener('click', async () => { 
            const validationError = validateInputs(); 
            if (validationError) { showAlert(validationError); return; } 
            setUIState('loading'); 
            loaderText.innerText = "מושך נתוני שוק..."; 
            const payload = { tickers: document.getElementById('tickers').value, startDate: document.getElementById('startDate').value, endDate: document.getElementById('endDate').value, frequency: document.getElementById('frequency').value, action: 'csv' }; 
            try { 
                const response = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) }); 
                if (!response.ok) throw new Error(`HTTP שגיאה: ${response.status}`); 
                const data = await response.json(); 
                if (data.status === 'success' && data.csvData) { 
                    globalCsvData = data.csvData; 
                    renderTable(globalCsvData); 
                    setUIState('idle'); 
                    previewContainer.classList.remove('hidden'); 
                    exportContainer.classList.remove('hidden'); 
                } else { throw new Error(data.message || "שגיאה לא ידועה התקבלה מהשרת."); } 
            } catch (err) { setUIState('idle'); showAlert(`<strong>שגיאת תקשורת:</strong><br><span class="dir-ltr inline-block text-left">${err.message}</span>`); } 
        });

        btnCsv.addEventListener('click', () => { if (!globalCsvData) return; const blob = new Blob([globalCsvData], { type: 'text/csv;charset=utf-8;' }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = `market_data_export_${new Date().toISOString().slice(0,10)}.csv`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); });
        btnSheet.addEventListener('click', async () => { 
            if (validateInputs()) return; 
            setUIState('loading'); 
            loaderText.innerText = "מייצר גיליון Google Sheets במערכת..."; 
            const payload = { tickers: elTickers.value, startDate: elStartDate.value, endDate: elEndDate.value, frequency: elFrequency.value, action: 'sheet' }; 
            try { 
                const response = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) }); 
                const data = await response.json(); 
                if (data.status === 'success' && data.sheetUrl) { 
                    setUIState('idle'); 
                    exportContainer.innerHTML = `<div class="bg-neon-green/10 border border-neon-green/30 rounded-xl p-6 text-center shadow-[0_0_20px_rgba(0,255,135,0.1)]"><div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-neon-green/20 mb-3"><svg class="w-6 h-6 text-neon-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></div><h3 class="text-xl font-bold text-white mb-2">הגיליון נוצר בהצלחה!</h3><a href="${data.sheetUrl}" target="_blank" class="inline-flex items-center gap-2 bg-neon-green text-navy-900 font-bold py-2.5 px-6 rounded-lg transition-all hover:shadow-[0_0_15px_rgba(0,255,135,0.4)] mt-4">פתח גיליון <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg></a></div>`; 
                    exportContainer.classList.remove('hidden'); 
                } else { throw new Error(data.message || "Unknown error creating sheet."); } 
            } catch (err) { setUIState('idle'); exportContainer.classList.remove('hidden'); showAlert(`<strong>שגיאה ביצירת הגיליון:</strong><br><span class="dir-ltr inline-block text-left">${err.message}</span>`); } 
        });
    </script>
</body>
